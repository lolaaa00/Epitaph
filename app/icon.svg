<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050406"/>
      <stop offset="100%" stop-color="#0B0B10"/>
    </linearGradient>
    <linearGradient id="seal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D6A84F"/>
      <stop offset="50%" stop-color="#E8C47A"/>
      <stop offset="100%" stop-color="#D6A84F"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D6A84F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#050406" stop-opacity="0"/>
    </radialGradient>
    <filter id="f1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Ambient gold glow -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>

  <!-- Outer seal ring with decorative notches -->
  <circle cx="32" cy="32" r="27"
    fill="none" stroke="rgba(214,168,79,0.3)" stroke-width="0.7"
    stroke-dasharray="2 3"/>

  <!-- Main seal circle -->
  <circle cx="32" cy="32" r="22"
    fill="rgba(214,168,79,0.05)"
    stroke="url(#seal-grad)"
    stroke-width="1.2"
    filter="url(#f1)"/>

  <!-- Inner ring -->
  <circle cx="32" cy="32" r="16"
    fill="none"
    stroke="rgba(214,168,79,0.2)"
    stroke-width="0.6"/>

  <!-- 4-point star cross (the EPITAPH mark) -->
  <!-- Vertical -->
  <line x1="32" y1="18" x2="32" y2="46"
    stroke="url(#seal-grad)" stroke-width="0.8" opacity="0.5"/>
  <!-- Horizontal -->
  <line x1="18" y1="32" x2="46" y2="32"
    stroke="url(#seal-grad)" stroke-width="0.8" opacity="0.5"/>

  <!-- Corner flourishes at 45 degrees (tiny) -->
  <line x1="22" y1="22" x2="26" y2="26"
    stroke="rgba(214,168,79,0.3)" stroke-width="0.6"/>
  <line x1="42" y1="22" x2="38" y2="26"
    stroke="rgba(214,168,79,0.3)" stroke-width="0.6"/>
  <line x1="22" y1="42" x2="26" y2="38"
    stroke="rgba(214,168,79,0.3)" stroke-width="0.6"/>
  <line x1="42" y1="42" x2="38" y2="38"
    stroke="rgba(214,168,79,0.3)" stroke-width="0.6"/>

  <!-- Central "E" as a wax seal inscription -->
  <!-- E: three horizontal strokes + one vertical -->
  <rect x="27" y="24.5" width="10" height="1.5" rx="0.75" fill="url(#seal-grad)" opacity="0.95"/>
  <rect x="27" y="31.25" width="8" height="1.5" rx="0.75" fill="url(#seal-grad)" opacity="0.95"/>
  <rect x="27" y="38" width="10" height="1.5" rx="0.75" fill="url(#seal-grad)" opacity="0.95"/>
  <rect x="27" y="24.5" width="1.5" height="15" rx="0.75" fill="url(#seal-grad)" opacity="0.95"/>

  <!-- Tiny wax dots at cardinal points of outer ring -->
  <circle cx="32" cy="5" r="1.5" fill="#D6A84F" opacity="0.7"/>
  <circle cx="59" cy="32" r="1.5" fill="#D6A84F" opacity="0.55"/>
  <circle cx="32" cy="59" r="1.5" fill="#D6A84F" opacity="0.7"/>
  <circle cx="5" cy="32" r="1.5" fill="#D6A84F" opacity="0.55"/>

  <!-- Outer border -->
  <rect width="64" height="64" rx="12" fill="none"
    stroke="rgba(214,168,79,0.18)" stroke-width="0.8"/>
</svg>
